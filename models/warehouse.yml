name: "Warehouse"
machine_category: "unknown"
machine_type: "unknown"
machine_model: "unknown"
description: "Data model for automated vertical warehouse"

root:
  !!FolderNode
  name: "Warehouse"
  description: "Root of the warehouse"
  children:
    - !!FolderNode
      name: "Status"
      children:
        - !!NumericalVariableNode
          name: "pos_y"
          initial_value: 0
        - !!NumericalVariableNode
          name: "tray_at_bay"
          initial_value: 0
        - !!BooleanVariableNode
          name: "Busy"
          initial_value: false

    - !!FolderNode
      name: "Control"
      children:
        - !!NumericalVariableNode
          name: "target_y"
          initial_value: 0

    - !!FolderNode
      name: "Actions"
      children:
        - !!AsyncMethodNode
          name: "extract"
          description: "extract tray"
        - !!AsyncMethodNode
          name: "sendback"
          description: "sendback tray"